services:
  postgres:
      image: postgres:15
      environment:
        POSTGRES_USER: user
        POSTGRES_PASSWORD: password
        POSTGRES_DB: market_data_db
      ports:
        - "5433:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U user -d market_data_db"]
        interval: 3s
        timeout: 3s
        retries: 5
  db-migrations:
    build: ./db
    # "Drogi Dockerze, cokolwiek Twój program stworzy lub zmieni w swoim wewnętrznym folderze /app,
    # natychmiast skopiuj to jeden do jednego do folderu db na moim laptopie".
    volumes:
      - ./db:/app
      - ./shared:/app/shared
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
          postgres:
            condition: service_healthy
  market-data-service:
    build: ./services/market-data-service
    ports:
      - "8001:8001"
    volumes:
      - ./shared:/app/shared
    environment:
      - TICK_INTERVAL_MS=10000
      - DATABASE_URL=${DATABASE_URL}
  pricing-service:
    build: ./services/pricing-service
    ports:
      - "8002:8002"
    volumes:
      - ./shared:/app/shared
    environment:
      - DATABASE_URL=${DATABASE_URL}
  # monitoring-service:
  #   build: ./services/monitoring-service
  #   ports:
  #     - "8003:8003"
  books-service:
    build: ./services/books-service
    ports:
      - "8004:8004"
    volumes:
      - ./shared:/app/shared
    environment:
      - DATABASE_URL=${DATABASE_URL}
  blotter-service:
    build: ./services/blotter-service
    ports:
      - "8006:8006"
    volumes:
      - ./shared:/app/shared
    environment:
      - DATABASE_URL=${DATABASE_URL}
  trade-generation-service:
    build: ./services/trade-generation-service
    ports:
      - "8007:8007"
    volumes:
      - ./shared:/app/shared
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TRADE_GENERATION_INTERVAL_MS=${TRADE_GENERATION_INTERVAL_MS}
  trade-action-service:
    build: ./services/trade-action-service
    ports:
      - "8080:8080"
    volumes:
      - ./shared:/app/shared
    environment:
      - DATABASE_URL=${DATABASE_URL}
    